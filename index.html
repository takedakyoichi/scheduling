<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日程調整 | Scheduling Tool</title>
  <style>
    :root {
      --green: #006934;
      --green-dark: #004d26;
      --green-light: #e8f5ee;
      --green-mid: #b8ddc8;
      --gold: #c8a84b;
      --text: #1a1a1a;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,80,40,0.10);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      background: linear-gradient(160deg, #f0f7f3 0%, #e8f0ec 100%);
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* ヘッダー */
    .header {
      background: linear-gradient(135deg, var(--green-dark) 0%, var(--green) 100%);
      padding: 0 24px;
      box-shadow: 0 2px 16px rgba(0,60,30,0.25);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
      height: 60px;
    }
    .header-logo {
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header-titles h1 {
      color: white;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.06em;
    }
    .header-titles .subtitle {
      color: rgba(255,255,255,0.6);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ページ本体 */
    .page { max-width: 760px; margin: 0 auto; padding: 28px 16px 0; }

    /* カード */
    .card {
      background: white;
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(0,105,52,0.08);
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--green);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--green-light);
    }
    .card-title .icon {
      width: 28px; height: 28px;
      background: var(--green-light);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    /* フォーム */
    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    input[type="text"], input[type="date"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fafafa;
    }
    input[type="text"]:focus, input[type="date"]:focus {
      border-color: var(--green);
      background: white;
      box-shadow: 0 0 0 3px rgba(0,105,52,0.12);
    }

    /* ラジオグループ */
    .radio-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .radio-chip input[type="radio"] { display: none; }
    .radio-chip label {
      display: inline-block;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      background: white;
      text-transform: none;
      letter-spacing: 0;
    }
    .radio-chip input[type="radio"]:checked + label {
      background: var(--green);
      border-color: var(--green);
      color: white;
      box-shadow: 0 2px 8px rgba(0,105,52,0.25);
    }

    /* 候補日リスト */
    .date-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      animation: fadeUp 0.2s ease;
    }
    .date-row input[type="date"] { flex: 1; }
    .day-badge {
      min-width: 36px;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 600;
      color: white;
      background: var(--green);
      border-radius: 6px;
      padding: 3px 6px;
    }
    .day-badge.weekend { background: #e55; }
    .btn-remove {
      background: none; border: none;
      color: #ccc; font-size: 1.1rem;
      cursor: pointer; padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .btn-remove:hover { color: #e55; }

    /* ボタン */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.15s;
      letter-spacing: 0.02em;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: var(--green);
      color: white;
      box-shadow: 0 2px 8px rgba(0,105,52,0.3);
    }
    .btn-primary:hover { background: var(--green-dark); box-shadow: 0 4px 12px rgba(0,105,52,0.4); }
    .btn-primary:disabled { background: #aaa; box-shadow: none; cursor: not-allowed; }
    .btn-secondary {
      background: var(--green-light);
      color: var(--green);
      border: 1.5px solid var(--green-mid);
    }
    .btn-secondary:hover { background: var(--green-mid); }
    .btn-ghost {
      background: white;
      color: var(--text-muted);
      border: 1.5px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--green); color: var(--green); }
    .btn-full { width: 100%; margin-top: 8px; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }

    /* シェアボックス */
    .share-box {
      background: linear-gradient(135deg, #f0fff7, #e8f5ee);
      border: 1.5px solid var(--green-mid);
      border-radius: 10px;
      padding: 16px;
      margin-top: 20px;
      display: none;
      animation: fadeUp 0.3s ease;
    }
    .share-box .share-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--green);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .share-url { display: flex; gap: 8px; }
    .share-url input {
      flex: 1;
      font-size: 0.82rem;
      background: white;
      color: #333;
    }

    /* トースト通知 */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a1a;
      color: white;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      z-index: 1000;
      transition: transform 0.3s ease;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* 回答フォーム */
    .answer-form {
      background: var(--green-light);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 20px;
      border: 1px solid var(--green-mid);
    }
    .answer-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    @media (max-width: 500px) { .answer-form-grid { grid-template-columns: 1fr; } }
    .answer-form input { margin-bottom: 0; background: white; }

    /* テーブル */
    .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; min-width: 300px; }
    thead tr { background: linear-gradient(135deg, var(--green-dark), var(--green)); }
    th {
      padding: 12px 10px;
      text-align: center;
      color: white;
      font-weight: 600;
      white-space: nowrap;
      font-size: 0.82rem;
    }
    th.date-col { text-align: left; min-width: 90px; }
    tbody tr { transition: background 0.1s; }
    tbody tr:hover { background: #f9fafb; }
    tbody tr:last-child td { border-bottom: none; }
    td {
      padding: 10px 10px;
      text-align: center;
      border-bottom: 1px solid #f0f0f0;
    }
    td.date-cell {
      text-align: left;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      font-size: 0.85rem;
    }
    td.date-cell.is-best {
      color: var(--green);
      background: var(--green-light);
    }
    td.date-cell.is-best::before {
      content: '★ ';
      color: var(--gold);
    }

    /* 投票ボタン */
    .vote-btn {
      background: none;
      border: 2px solid transparent;
      border-radius: 6px;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 3px 5px;
      opacity: 0.2;
      transition: all 0.15s;
    }
    .vote-btn:hover { opacity: 0.6; transform: scale(1.1); }
    .vote-btn.selected { border-color: currentColor; opacity: 1; transform: scale(1.05); }
    .vote-btn.circle { color: #007a3d; }
    .vote-btn.triangle { color: var(--gold); }
    .vote-btn.cross { color: #c0392b; }

    /* ポイント列 */
    .point-cell {
      font-weight: 700;
      font-size: 0.95rem;
      min-width: 52px;
    }
    .point-cell.is-best {
      color: var(--green);
      background: var(--green-light);
    }

    /* 参加者ヘッダー */
    .participant-th {
      min-width: 80px;
      font-size: 0.82rem;
    }
    .del-btn {
      display: inline-block;
      margin-top: 5px;
      font-size: 0.68rem;
      background: none;
      border: 1px solid rgba(255,255,255,0.4);
      color: rgba(255,255,255,0.8);
      border-radius: 4px;
      cursor: pointer;
      padding: 1px 6px;
      font-weight: normal;
      transition: all 0.15s;
    }
    .del-btn:hover { background: rgba(255,255,255,0.15); color: white; }

    /* 備考行 */
    .note-row td { background: #fafafa; padding: 8px 10px; }
    .note-label { font-size: 0.78rem; color: var(--text-muted); font-weight: 600; }
    .note-input {
      font-size: 0.8rem;
      color: #555;
      border: none;
      border-bottom: 1.5px dashed var(--green-mid);
      outline: none;
      background: transparent;
      width: 100%;
      padding: 2px 0;
      transition: border-color 0.2s;
    }
    .note-input:focus { border-color: var(--green); }

    /* ステータスバッジ */
    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .empty-msg, .loading {
      text-align: center;
      color: #bbb;
      padding: 40px;
      font-size: 0.9rem;
    }
    .loading::before { content: '⏳ '; }

    #viewCard { display: none; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-logo">📅</div>
    <div class="header-titles">
      <h1>日程調整</h1>
      <div class="subtitle">Scheduling Tool</div>
    </div>
  </div>
</div>

<div class="page">

<!-- イベント作成カード -->
<div class="card" id="setupCard">
  <div class="card-title">
    <div class="icon">✏️</div>
    イベントを作成
  </div>

  <div class="field">
    <label>イベント名</label>
    <input type="text" id="eventName" placeholder="例：6月の飲み会">
  </div>

  <div class="field">
    <label>開始日</label>
    <input type="date" id="startDate">
  </div>

  <div class="field">
    <label>期間</label>
    <div class="radio-group">
      <div class="radio-chip"><input type="radio" name="weeks" id="w1" value="1"><label for="w1">1週間</label></div>
      <div class="radio-chip"><input type="radio" name="weeks" id="w2" value="2"><label for="w2">2週間</label></div>
      <div class="radio-chip"><input type="radio" name="weeks" id="w3" value="3" checked><label for="w3">3週間</label></div>
      <div class="radio-chip"><input type="radio" name="weeks" id="w4" value="4"><label for="w4">1ヶ月</label></div>
      <div class="radio-chip"><input type="radio" name="weeks" id="w8" value="8"><label for="w8">2ヶ月</label></div>
    </div>
  </div>

  <div class="field">
    <label>曜日</label>
    <div class="radio-group">
      <div class="radio-chip"><input type="radio" name="daytype" id="dt1" value="weekday" checked><label for="dt1">平日のみ（祝日除く）</label></div>
      <div class="radio-chip"><input type="radio" name="daytype" id="dt2" value="all"><label for="dt2">土日祝を含む</label></div>
    </div>
  </div>

  <div class="field">
    <label>候補日</label>
    <div id="dateList"></div>
    <div class="btn-row" style="margin-top:8px">
      <button class="btn btn-secondary" id="autoFillBtn">⚡ 自動入力</button>
      <button class="btn btn-ghost" id="addDateBtn">＋ 手動で追加</button>
    </div>
  </div>

  <button class="btn btn-primary btn-full" id="createBtn" style="padding:14px;">
    🔗 イベントを作成してリンクを発行
  </button>

  <div class="share-box" id="shareBox">
    <div class="share-label">✅ 作成完了！リンクを参加者に共有してください</div>
    <div class="share-url">
      <input type="text" id="shareUrl" readonly>
      <button class="btn btn-primary" id="copyBtn">コピー</button>
    </div>
  </div>
</div>

<!-- 回答カード -->
<div class="card" id="viewCard">
  <div class="card-title">
    <div class="icon">🗓️</div>
    <span id="viewTitle">出欠を回答する</span>
  </div>

  <div class="answer-form">
    <div class="answer-form-grid">
      <div>
        <div style="font-size:0.78rem;font-weight:600;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.04em;">名前</div>
        <input type="text" id="participantName" placeholder="山田 太郎">
      </div>
      <div>
        <div style="font-size:0.78rem;font-weight:600;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.04em;">備考（アレルギー等）</div>
        <input type="text" id="participantNote" placeholder="例：魚介類アレルギー">
      </div>
    </div>
    <button class="btn btn-primary" id="addParticipantBtn" style="width:100%;padding:12px;">
      回答を登録する
    </button>
  </div>

  <div id="tableWrap"><p class="loading">読み込み中</p></div>

  <div class="legend">
    <div class="legend-item"><span style="color:#007a3d;font-size:1rem;">◯</span> 参加できる（1pt）</div>
    <div class="legend-item"><span style="color:var(--gold);font-size:1rem;">△</span> おそらく参加可能（0.5pt）</div>
    <div class="legend-item"><span style="color:#c0392b;font-size:1rem;">✕</span> 参加できない（0pt）</div>
    <div class="legend-item"><span style="color:var(--gold);">★</span> 最高得点日</div>
  </div>
</div>

</div><!-- .page -->

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDkczQ9y3u3XaPgWtwBkXm0wwt3bsOGsZ4",
    authDomain: "nomikai-42968.firebaseapp.com",
    projectId: "nomikai-42968",
    storageBucket: "nomikai-42968.firebasestorage.app",
    messagingSenderId: "372499119823",
    appId: "1:372499119823:web:bcf75f587b6ef9ef8cc1ba"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // トースト通知
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // 祝日データ（2026〜2027年）
  const HOLIDAYS = {
    '2026-01-01':1,'2026-01-12':1,'2026-02-11':1,'2026-02-23':1,
    '2026-03-20':1,'2026-04-29':1,'2026-05-03':1,'2026-05-04':1,
    '2026-05-05':1,'2026-05-06':1,'2026-07-20':1,'2026-08-11':1,
    '2026-09-21':1,'2026-09-22':1,'2026-09-23':1,'2026-10-12':1,
    '2026-11-03':1,'2026-11-23':1,'2026-12-23':1,
    '2027-01-01':1,'2027-01-11':1,'2027-02-11':1,'2027-02-23':1,
    '2027-03-22':1,'2027-04-29':1,'2027-05-03':1,'2027-05-04':1,
    '2027-05-05':1,'2027-07-19':1,'2027-08-11':1,'2027-09-20':1,
    '2027-09-23':1,'2027-10-11':1,'2027-11-03':1,'2027-11-23':1
  };

  const WEEKS = ['日','月','火','水','木','金','土'];

  function toDateStr(d) {
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    return `${yyyy}-${mm}-${dd}`;
  }

  function addDateRow(value) {
    const row = document.createElement('div');
    row.className = 'date-row';
    const input = document.createElement('input');
    input.type = 'date';
    if (value) input.value = value;

    const badge = document.createElement('span');
    badge.className = 'day-badge';
    const updateBadge = () => {
      if (input.value) {
        const dt = new Date(input.value + 'T00:00:00');
        const day = dt.getDay();
        badge.textContent = WEEKS[day];
        badge.className = 'day-badge' + (day === 0 || day === 6 ? ' weekend' : '');
      } else {
        badge.textContent = '';
      }
    };
    input.addEventListener('change', updateBadge);
    input.addEventListener('input', updateBadge);
    updateBadge();

    const btn = document.createElement('button');
    btn.className = 'btn-remove';
    btn.textContent = '✕';
    btn.addEventListener('click', () => row.remove());

    row.appendChild(input);
    row.appendChild(badge);
    row.appendChild(btn);
    document.getElementById('dateList').appendChild(row);
  }

  function getDates() {
    return Array.from(document.querySelectorAll('#dateList input[type=date]'))
      .map(el => el.value).filter(d => d !== '');
  }

  document.getElementById('autoFillBtn').addEventListener('click', () => {
    const startVal = document.getElementById('startDate').value;
    if (!startVal) { showToast('⚠️ 開始日を選択してください'); return; }
    const weeks = parseInt(document.querySelector('input[name="weeks"]:checked').value);
    const weekdayOnly = document.querySelector('input[name="daytype"]:checked').value === 'weekday';
    document.getElementById('dateList').innerHTML = '';
    const current = new Date(startVal + 'T00:00:00');
    const end = new Date(startVal + 'T00:00:00');
    end.setDate(end.getDate() + weeks * 7);
    while (current < end) {
      const dateStr = toDateStr(current);
      const day = current.getDay();
      const skip = weekdayOnly && (day === 0 || day === 6 || HOLIDAYS[dateStr]);
      if (!skip) addDateRow(dateStr);
      current.setDate(current.getDate() + 1);
    }
    showToast('✅ 候補日を自動入力しました');
  });

  document.getElementById('addDateBtn').addEventListener('click', () => addDateRow(''));

  document.getElementById('createBtn').addEventListener('click', async () => {
    const name = document.getElementById('eventName').value.trim();
    const dates = getDates();
    if (!name) { showToast('⚠️ イベント名を入力してください'); return; }
    if (dates.length === 0) { showToast('⚠️ 候補日を1つ以上選択してください'); return; }
    const btn = document.getElementById('createBtn');
    btn.textContent = '作成中...';
    btn.disabled = true;
    const eventId = Math.random().toString(36).slice(2, 10);
    await setDoc(doc(db, 'events', eventId), { name, dates, participants: {} });
    const url = `${location.origin}${location.pathname}?event=${eventId}`;
    document.getElementById('shareUrl').value = url;
    document.getElementById('shareBox').style.display = 'block';
    btn.textContent = '✅ 作成済み';
    showToast('🎉 イベントを作成しました！');
  });

  document.getElementById('copyBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(document.getElementById('shareUrl').value).then(() => {
      document.getElementById('copyBtn').textContent = '✅ コピー済み';
      showToast('📋 リンクをコピーしました');
      setTimeout(() => document.getElementById('copyBtn').textContent = 'コピー', 2000);
    });
  });

  // URLパラメータ
  const params = new URLSearchParams(location.search);
  const eventId = params.get('event');

  if (eventId) {
    document.getElementById('setupCard').style.display = 'none';
    document.getElementById('viewCard').style.display = 'block';
    const eventRef = doc(db, 'events', eventId);

    onSnapshot(eventRef, (snap) => {
      if (!snap.exists()) {
        document.getElementById('tableWrap').innerHTML = '<p class="empty-msg">イベントが見つかりません</p>';
        return;
      }
      const data = snap.data();
      document.getElementById('viewTitle').textContent = data.name;
      renderTable(data.dates, data.participants || {});
    });

    document.getElementById('addParticipantBtn').addEventListener('click', async () => {
      const name = document.getElementById('participantName').value.trim();
      if (!name) { showToast('⚠️ 名前を入力してください'); return; }
      const snap = await getDoc(eventRef);
      const data = snap.data();
      if (data.participants && data.participants[name]) {
        showToast('⚠️ 同じ名前が既に登録されています'); return;
      }
      const note = document.getElementById('participantNote').value.trim();
      const votes = { _note: note, _joinedAt: Date.now() };
      data.dates.forEach((_, i) => votes[i] = 'o');
      await updateDoc(eventRef, { [`participants.${name}`]: votes });
      document.getElementById('participantName').value = '';
      document.getElementById('participantNote').value = '';
      showToast(`✅ ${name} さんの回答を登録しました`);
    });
  }

  function renderTable(dates, participants) {
    const wrap = document.getElementById('tableWrap');
    const entries = Object.entries(participants);
    if (entries.length === 0) {
      wrap.innerHTML = '<p class="empty-msg">まだ回答がありません</p>';
      return;
    }

    const counts = dates.map((_, i) =>
      entries.reduce((sum, [, v]) => sum + (v[i]==='o' ? 1 : v[i]==='t' ? 0.5 : 0), 0)
    );
    const maxCount = Math.max(...counts);

    entries.sort((a, b) => (a[1]._joinedAt || 0) - (b[1]._joinedAt || 0));

    const nameHeaders = entries.map(([name]) =>
      `<th class="participant-th">${name}<br>
       <button class="del-btn" data-name="${name}">🗑 削除</button></th>`
    ).join('');

    const rows = dates.map((d, i) => {
      const dt = new Date(d + 'T00:00:00');
      const day = dt.getDay();
      const dateLabel = `${dt.getMonth()+1}/${dt.getDate()}(${WEEKS[day]})`;
      const isBest = counts[i] === maxCount && maxCount > 0;
      const cells = entries.map(([name, votes]) => {
        const v = votes[i] || 'o';
        return `<td>${[['o','◯','circle'],['t','△','triangle'],['x','✕','cross']].map(([key,label,cls]) =>
          `<button class="vote-btn ${cls} ${v===key?'selected':''}" data-name="${name}" data-idx="${i}" data-key="${key}">${label}</button>`
        ).join('')}</td>`;
      }).join('');
      const countStr = Number.isInteger(counts[i]) ? counts[i] : counts[i].toFixed(1);
      return `<tr>
        <td class="date-cell${isBest?' is-best':''}">${dateLabel}</td>
        ${cells}
        <td class="point-cell${isBest?' is-best':''}">${countStr}</td>
      </tr>`;
    }).join('');

    const noteCells = entries.map(([name, votes]) => {
      const noteVal = (votes._note || '').replace(/"/g,'&quot;');
      return `<td><input type="text" class="note-input" data-name="${name}" value="${noteVal}" placeholder="備考を追加..."></td>`;
    }).join('');

    wrap.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th class="date-col">日付</th>
            ${nameHeaders}
            <th style="min-width:52px">Pt</th>
          </tr></thead>
          <tbody>
            ${rows}
            <tr class="note-row">
              <td class="date-cell note-label">備考</td>
              ${noteCells}
              <td></td>
            </tr>
          </tbody>
        </table>
      </div>`;

    wrap.querySelectorAll('.del-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const name = btn.dataset.name;
        if (!confirm(`「${name}」の回答を削除しますか？`)) return;
        const snap = await getDoc(doc(db, 'events', eventId));
        const newP = { ...snap.data().participants };
        delete newP[name];
        await updateDoc(doc(db, 'events', eventId), { participants: newP });
        showToast(`🗑 ${name} さんの回答を削除しました`);
      });
    });

    wrap.querySelectorAll('.note-input').forEach(input => {
      input.addEventListener('change', async () => {
        await updateDoc(doc(db, 'events', eventId), {
          [`participants.${input.dataset.name}._note`]: input.value.trim()
        });
        showToast('💾 備考を保存しました');
      });
    });

    wrap.querySelectorAll('.vote-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        await updateDoc(doc(db, 'events', eventId), {
          [`participants.${btn.dataset.name}.${btn.dataset.idx}`]: btn.dataset.key
        });
      });
    });
  }
</script>
</body>
</html>
