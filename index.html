<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日程調整</title>
  <style>
    /* SMBC カラー定義 */
    :root {
      --smbc-green: #006934;
      --smbc-green-dark: #004d26;
      --smbc-green-light: #e6f2ec;
      --smbc-green-mid: #c2dece;
      --smbc-gold: #c8a84b;
      --smbc-text: #1a1a1a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #f0f5f2;
      min-height: 100vh;
      padding: 0 0 40px;
    }

    /* ヘッダーバー */
    .header {
      background: var(--smbc-green);
      padding: 16px 24px;
      margin-bottom: 28px;
      box-shadow: 0 2px 8px rgba(0,80,40,0.2);
    }
    .header h1 {
      color: white;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-align: left;
      margin: 0;
    }
    .header .subtitle {
      color: rgba(255,255,255,0.7);
      font-size: 0.8rem;
      margin-top: 2px;
    }

    .card {
      background: white;
      border-radius: 4px;
      padding: 24px;
      max-width: 720px;
      margin: 0 auto 20px;
      box-shadow: 0 1px 6px rgba(0,80,40,0.1);
      border-top: 3px solid var(--smbc-green);
    }
    .card h2 { font-size: 1rem; color: var(--smbc-green); margin-bottom: 16px; font-weight: 700; border-bottom: 1px solid var(--smbc-green-mid); padding-bottom: 8px; }
    label { display: block; font-size: 0.85rem; color: #444; margin-bottom: 4px; font-weight: 500; }
    input[type="text"], input[type="date"] {
      width: 100%; padding: 10px 12px;
      border: 1px solid #ccd; border-radius: 3px;
      font-size: 1rem; outline: none; margin-bottom: 12px;
      color: var(--smbc-text);
    }
    input:focus { border-color: var(--smbc-green); box-shadow: 0 0 0 2px rgba(0,105,52,0.15); }
    .date-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .date-row input { margin-bottom: 0; flex: 1; }
    .btn-remove { background: none; border: none; color: #bbb; font-size: 1.2rem; cursor: pointer; padding: 4px 8px; border-radius: 3px; }
    .btn-remove:hover { color: #e55; }
    .btn { display: inline-block; padding: 10px 20px; border-radius: 3px; border: none; cursor: pointer; font-size: 0.95rem; font-weight: 600; transition: background 0.15s; }
    .btn-primary { background: var(--smbc-green); color: white; }
    .btn-primary:hover { background: var(--smbc-green-dark); }
    .btn-secondary { background: var(--smbc-green-light); color: var(--smbc-green); margin-top: 8px; border: 1px solid var(--smbc-green-mid); }
    .btn-secondary:hover { background: var(--smbc-green-mid); }
    .btn-full { width: 100%; margin-top: 16px; }
    .radio-group { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
    .radio-group label { display: flex; align-items: center; gap: 4px; font-size: 0.95rem; cursor: pointer; margin-bottom: 0; font-weight: normal; }
    input[type="radio"] { accent-color: var(--smbc-green); }
    .share-box {
      background: var(--smbc-green-light); border-radius: 4px; padding: 16px;
      margin-top: 16px; display: none; border: 1px solid var(--smbc-green-mid);
    }
    .share-box p { font-size: 0.9rem; color: #333; margin-bottom: 8px; }
    .share-url { display: flex; gap: 8px; }
    .share-url input { flex: 1; margin-bottom: 0; font-size: 0.85rem; background: white; color: #333; }
    .share-url button { white-space: nowrap; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin-bottom: 16px; overflow-x: auto; display: block; }
    th { background: var(--smbc-green); padding: 10px 8px; text-align: center; color: white; white-space: nowrap; font-weight: 600; }
    th.name-col { text-align: left; min-width: 80px; }
    td { padding: 10px 8px; text-align: center; border-bottom: 1px solid #eee; }
    td.name-cell { text-align: left; font-weight: 600; color: var(--smbc-text); white-space: nowrap; }
    .vote-btn { background: none; border: 2px solid transparent; border-radius: 4px; font-size: 1.2rem; cursor: pointer; padding: 2px 6px; opacity: 0.3; }
    .vote-btn.selected { border-color: currentColor; opacity: 1; }
    .vote-btn.circle { color: #007a3d; }
    .vote-btn.triangle { color: #c8a84b; }
    .vote-btn.cross { color: #c0392b; }
    .count-row td { font-size: 0.85rem; color: #666; border-top: 2px solid var(--smbc-green-mid); background: #fafafa; }
    .best { background: var(--smbc-green-light) !important; font-weight: bold; color: var(--smbc-green) !important; }
    .name-input-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .name-input-row input { margin-bottom: 0; flex: 1; }
    .empty-msg { text-align: center; color: #aaa; padding: 24px; }
    .loading { text-align: center; color: #aaa; padding: 24px; }
    #viewCard { display: none; }
  </style>
</head>
<body>

<div class="header">
  <h1>日程調整</h1>
  <div class="subtitle">Scheduling Tool</div>
</div>

<!-- イベント作成カード -->
<div class="card" id="setupCard">
  <h2>📅 イベントを作成</h2>
  <label>イベント名</label>
  <input type="text" id="eventName" placeholder="例：6月の飲み会">

  <label>開始日</label>
  <input type="date" id="startDate">

  <label>期間</label>
  <div class="radio-group">
    <label><input type="radio" name="weeks" value="1"> 1週間</label>
    <label><input type="radio" name="weeks" value="2"> 2週間</label>
    <label><input type="radio" name="weeks" value="3" checked> 3週間</label>
    <label><input type="radio" name="weeks" value="4"> 1ヶ月</label>
    <label><input type="radio" name="weeks" value="8"> 2ヶ月</label>
  </div>

  <label>曜日</label>
  <div class="radio-group">
    <label><input type="radio" name="daytype" value="weekday" checked> 平日のみ（祝日除く）</label>
    <label><input type="radio" name="daytype" value="all"> 土日祝を含む</label>
  </div>

  <label style="margin-top:4px">候補日（個別に追加・削除できます）</label>
  <div id="dateList"></div>
  <button class="btn btn-secondary" id="autoFillBtn">候補日を自動入力</button>
  <button class="btn btn-secondary" id="addDateBtn" style="margin-left:8px">＋ 手動で追加</button>
  <button class="btn btn-primary btn-full" id="createBtn">イベントを作成してリンクを発行</button>

  <div class="share-box" id="shareBox">
    <p>✅ イベントが作成されました！このリンクを参加者に共有してください：</p>
    <div class="share-url">
      <input type="text" id="shareUrl" readonly>
      <button class="btn btn-primary" id="copyBtn">コピー</button>
    </div>
  </div>
</div>

<!-- 回答カード -->
<div class="card" id="viewCard">
  <h2 id="viewTitle">✏️ 出欠を回答する</h2>
  <div class="name-input-row">
    <input type="text" id="participantName" placeholder="あなたの名前">
  </div>
  <div style="margin-bottom:12px">
    <label>備考（苦手な食べ物・アレルギー・コメントなど）</label>
    <input type="text" id="participantNote" placeholder="例：魚介類アレルギーあり" style="margin-bottom:0">
  </div>
  <button class="btn btn-primary" id="addParticipantBtn" style="margin-bottom:16px">回答する</button>
  <div id="tableWrap"><p class="loading">読み込み中...</p></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDkczQ9y3u3XaPgWtwBkXm0wwt3bsOGsZ4",
    authDomain: "nomikai-42968.firebaseapp.com",
    projectId: "nomikai-42968",
    storageBucket: "nomikai-42968.firebasestorage.app",
    messagingSenderId: "372499119823",
    appId: "1:372499119823:web:bcf75f587b6ef9ef8cc1ba"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 祝日データ（2026〜2027年）
  const HOLIDAYS = {
    '2026-01-01':1,'2026-01-12':1,'2026-02-11':1,'2026-02-23':1,
    '2026-03-20':1,'2026-04-29':1,'2026-05-03':1,'2026-05-04':1,
    '2026-05-05':1,'2026-05-06':1,'2026-07-20':1,'2026-08-11':1,
    '2026-09-21':1,'2026-09-22':1,'2026-09-23':1,'2026-10-12':1,
    '2026-11-03':1,'2026-11-23':1,'2026-12-23':1,
    '2027-01-01':1,'2027-01-11':1,'2027-02-11':1,'2027-02-23':1,
    '2027-03-22':1,'2027-04-29':1,'2027-05-03':1,'2027-05-04':1,
    '2027-05-05':1,'2027-07-19':1,'2027-08-11':1,'2027-09-20':1,
    '2027-09-23':1,'2027-10-11':1,'2027-11-03':1,'2027-11-23':1
  };

  function toDateStr(d) {
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    return `${yyyy}-${mm}-${dd}`;
  }

  function addDateRow(value) {
    const row = document.createElement('div');
    row.className = 'date-row';
    const input = document.createElement('input');
    input.type = 'date';
    if (value) input.value = value;
    const btn = document.createElement('button');
    btn.className = 'btn-remove';
    btn.textContent = '✕';
    btn.addEventListener('click', () => row.remove());

    const dayLabel = document.createElement('span');
    dayLabel.style.cssText = 'min-width:3em;font-size:0.9rem;color:#888;';
    const weeks = ['日','月','火','水','木','金','土'];
    const updateDay = () => {
      if (input.value) {
        const dt = new Date(input.value + 'T00:00:00');
        dayLabel.textContent = `(${weeks[dt.getDay()]})`;
      } else {
        dayLabel.textContent = '';
      }
    };
    input.addEventListener('change', updateDay);
    input.addEventListener('input', updateDay);
    updateDay();

    row.appendChild(input);
    row.appendChild(dayLabel);
    row.appendChild(btn);
    document.getElementById('dateList').appendChild(row);
  }

  function getDates() {
    return Array.from(document.querySelectorAll('#dateList input[type=date]'))
      .map(el => el.value).filter(d => d !== '');
  }

  document.getElementById('autoFillBtn').addEventListener('click', () => {
    const startVal = document.getElementById('startDate').value;
    if (!startVal) { alert('開始日を選択してください'); return; }
    const weeks = parseInt(document.querySelector('input[name="weeks"]:checked').value);
    const weekdayOnly = document.querySelector('input[name="daytype"]:checked').value === 'weekday';
    document.getElementById('dateList').innerHTML = '';
    const current = new Date(startVal + 'T00:00:00');
    const end = new Date(startVal + 'T00:00:00');
    end.setDate(end.getDate() + weeks * 7);
    while (current < end) {
      const dateStr = toDateStr(current);
      const day = current.getDay();
      const skip = weekdayOnly && (day === 0 || day === 6 || HOLIDAYS[dateStr]);
      if (!skip) addDateRow(dateStr);
      current.setDate(current.getDate() + 1);
    }
  });

  document.getElementById('addDateBtn').addEventListener('click', () => addDateRow(''));

  // イベント作成
  document.getElementById('createBtn').addEventListener('click', async () => {
    const name = document.getElementById('eventName').value.trim();
    const dates = getDates();
    if (!name) { alert('イベント名を入力してください'); return; }
    if (dates.length === 0) { alert('候補日を1つ以上選択してください'); return; }

    const eventId = Math.random().toString(36).slice(2, 10);
    await setDoc(doc(db, 'events', eventId), { name, dates, participants: {} });

    const url = `${location.origin}${location.pathname}?event=${eventId}`;
    document.getElementById('shareUrl').value = url;
    document.getElementById('shareBox').style.display = 'block';
    document.getElementById('createBtn').textContent = '✅ 作成済み';
    document.getElementById('createBtn').disabled = true;
  });

  document.getElementById('copyBtn').addEventListener('click', () => {
    const url = document.getElementById('shareUrl').value;
    navigator.clipboard.writeText(url).then(() => {
      document.getElementById('copyBtn').textContent = 'コピー済み！';
      setTimeout(() => document.getElementById('copyBtn').textContent = 'コピー', 2000);
    });
  });

  // URLパラメータでイベントIDがあれば回答画面を表示
  const params = new URLSearchParams(location.search);
  const eventId = params.get('event');

  if (eventId) {
    document.getElementById('setupCard').style.display = 'none';
    document.getElementById('viewCard').style.display = 'block';

    const eventRef = doc(db, 'events', eventId);

    // リアルタイム更新
    onSnapshot(eventRef, (snap) => {
      if (!snap.exists()) {
        document.getElementById('tableWrap').innerHTML = '<p class="empty-msg">イベントが見つかりません</p>';
        return;
      }
      const data = snap.data();
      document.getElementById('viewTitle').textContent = `✏️ ${data.name} — 出欠を回答`;
      renderTable(data.dates, data.participants || {});
    });

    document.getElementById('addParticipantBtn').addEventListener('click', async () => {
      const name = document.getElementById('participantName').value.trim();
      if (!name) { alert('名前を入力してください'); return; }
      const snap = await getDoc(eventRef);
      const data = snap.data();
      if (data.participants && data.participants[name]) {
        alert('同じ名前が既に登録されています'); return;
      }
      const note = document.getElementById('participantNote').value.trim();
      const votes = { _note: note, _joinedAt: Date.now() };
      data.dates.forEach((_, i) => votes[i] = 'o');
      await updateDoc(eventRef, { [`participants.${name}`]: votes });
      document.getElementById('participantName').value = '';
      document.getElementById('participantNote').value = '';
    });
  }

  function renderTable(dates, participants) {
    const wrap = document.getElementById('tableWrap');
    const entries = Object.entries(participants);
    if (entries.length === 0) {
      wrap.innerHTML = '<p class="empty-msg">まだ回答がありません</p>';
      return;
    }

    // △を0.5ポイントとしてカウント
    const counts = dates.map((_, i) =>
      entries.reduce((sum, [, v]) => sum + (v[i]==='o' ? 1 : v[i]==='t' ? 0.5 : 0), 0)
    );
    const maxCount = Math.max(...counts);
    const weeks = ['日','月','火','水','木','金','土'];

    // 回答順にソート
    entries.sort((a, b) => (a[1]._joinedAt || 0) - (b[1]._joinedAt || 0));

    // 参加者名ヘッダー（削除ボタン付き）
    const nameHeaders = entries.map(([name]) =>
      `<th style="min-width:80px">${name}<br><button class="del-btn" data-name="${name}" style="font-size:0.7rem;background:none;border:1px solid #c0392b;color:#c0392b;border-radius:3px;cursor:pointer;padding:1px 6px;margin-top:4px;font-weight:normal;">削除</button></th>`
    ).join('');

    // 日付ごとの行
    const rows = dates.map((d, i) => {
      const dt = new Date(d + 'T00:00:00');
      const dateLabel = `${dt.getMonth()+1}/${dt.getDate()}(${weeks[dt.getDay()]})`;
      const isBest = counts[i] === maxCount && maxCount > 0;
      const cells = entries.map(([name, votes]) => {
        const v = votes[i] || 'o';
        const btns = [['o','◯','circle'],['t','△','triangle'],['x','✕','cross']].map(([key,label,cls]) =>
          `<button class="vote-btn ${cls} ${v===key?'selected':''}" data-name="${name}" data-idx="${i}" data-key="${key}">${label}</button>`
        ).join('');
        return `<td>${btns}</td>`;
      }).join('');
      const countStr = Number.isInteger(counts[i]) ? counts[i] : counts[i].toFixed(1);
      return `<tr><td class="name-cell" style="${isBest?'color:var(--smbc-green);font-weight:700;':''}">${dateLabel}</td>${cells}<td class="count-cell ${isBest?'best':''}">${countStr}</td></tr>`;
    }).join('');

    // 備考行
    const noteCells = entries.map(([name, votes]) => {
      const noteVal = votes._note || '';
      return `<td><input type="text" class="note-input" data-name="${name}" value="${noteVal.replace(/"/g,'&quot;')}" placeholder="備考を追加..." style="font-size:0.8rem;color:#666;border:none;border-bottom:1px dashed #ccc;outline:none;background:transparent;width:100%;padding:2px 0;"></td>`;
    }).join('');

    wrap.innerHTML = `
      <table>
        <thead><tr><th class="name-col">日付</th>${nameHeaders}<th style="min-width:50px">ポイント</th></tr></thead>
        <tbody>
          ${rows}
          <tr class="count-row"><td style="color:#555;font-size:0.85rem;">備考</td>${noteCells}<td></td></tr>
        </tbody>
      </table>`;

    // 削除ボタンのイベント
    wrap.querySelectorAll('.del-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const name = btn.dataset.name;
        if (!confirm(`「${name}」の回答を削除しますか？`)) return;
        const snap = await getDoc(doc(db, 'events', eventId));
        const data = snap.data();
        const newParticipants = { ...data.participants };
        delete newParticipants[name];
        await updateDoc(doc(db, 'events', eventId), { participants: newParticipants });
      });
    });

    // 備考欄の編集イベント
    wrap.querySelectorAll('.note-input').forEach(input => {
      input.addEventListener('change', async () => {
        const name = input.dataset.name;
        await updateDoc(doc(db, 'events', eventId), {
          [`participants.${name}._note`]: input.value.trim()
        });
      });
    });

    // 投票ボタンのイベント
    wrap.querySelectorAll('.vote-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const name = btn.dataset.name;
        const idx = btn.dataset.idx;
        const key = btn.dataset.key;
        await updateDoc(doc(db, 'events', eventId), {
          [`participants.${name}.${idx}`]: key
        });
      });
    });
  }
</script>
</body>
</html>
