<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>調整くん | Scheduling Tool</title>
  <style>
    :root {
      --green: #006934;
      --green-dark: #1a2e1a;
      --green-light: #eef6f1;
      --green-mid: #b8ddc8;
      --gold: #c8a84b;
      --text: #1a1a1a;
      --text-muted: #6b7280;
      --border: #d9e5dd;
      --radius: 4px;
      --shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Sans', 'Yu Gothic UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #eef6f1;
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* SMBCスタイル：上部ダークバー */
    .header-top {
      background: #1a2e1a;
      height: 36px;
      display: flex; align-items: center;
      padding: 0 24px;
    }
    .header-top-inner {
      max-width: 960px; margin: 0 auto; width: 100%;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-top .brand {
      color: white; font-size: 0.78rem; font-weight: 600;
      letter-spacing: 0.08em; display: flex; align-items: center; gap: 6px;
    }
    .header-top .brand-leaf { color: #7dc87d; font-size: 1rem; }
    .header-top .group-name { color: rgba(255,255,255,0.6); font-size: 0.72rem; }

    /* SMBCスタイル：ロゴエリア（白背景） */
    .header {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .header-inner {
      max-width: 960px; margin: 0 auto;
      display: flex; align-items: center; gap: 12px; height: 56px;
    }
    .header-logo { font-size: 1.1rem; font-weight: 700; color: var(--text); letter-spacing: 0.02em; }
    .header-logo span { color: var(--green); }
    .header-titles .subtitle { color: var(--text-muted); font-size: 0.72rem; margin-left: 8px; }

    .page { max-width: 960px; margin: 0 auto; padding: 28px 16px 0; }

    /* SMBCスタイル：カード（角が鋭め、細いボーダー） */
    .card {
      background: white; border-radius: var(--radius); padding: 28px;
      margin-bottom: 16px; box-shadow: var(--shadow);
      border: 1px solid var(--border); animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-title {
      font-size: 1rem; font-weight: 700; color: var(--text);
      margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
      padding-bottom: 12px;
      border-bottom: 3px solid var(--green);
    }
    .card-title .icon {
      width: 28px; height: 28px; background: var(--green-light);
      border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 14px;
    }
    .field { margin-bottom: 18px; }
    .field label {
      display: block; font-size: 0.8rem; font-weight: 600;
      color: var(--text-muted); margin-bottom: 6px;
      letter-spacing: 0.04em; text-transform: uppercase;
    }
    input[type="text"], input[type="date"], input[type="password"] {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 0.95rem; outline: none; color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s; background: #fafafa;
    }
    input[type="text"]:focus, input[type="date"]:focus, input[type="password"]:focus {
      border-color: var(--green); background: white;
      box-shadow: 0 0 0 3px rgba(0,105,52,0.12);
    }
    .radio-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .radio-chip input[type="radio"] { display: none; }
    .radio-chip label {
      display: inline-block; padding: 7px 14px;
      border-radius: 20px; border: 1.5px solid var(--border);
      font-size: 0.85rem; font-weight: 500; color: var(--text-muted);
      cursor: pointer; transition: all 0.15s; background: white;
      text-transform: none; letter-spacing: 0;
    }
    .radio-chip input[type="radio"]:checked + label {
      background: var(--green); border-color: var(--green);
      color: white; box-shadow: 0 2px 8px rgba(0,105,52,0.25);
    }
    .date-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px; animation: fadeUp 0.2s ease;
    }
    .date-row input[type="date"] { flex: 1; }
    .day-badge {
      min-width: 36px; text-align: center; font-size: 0.8rem;
      font-weight: 600; color: white; background: var(--green);
      border-radius: 6px; padding: 3px 6px;
    }
    .day-badge.weekend { background: #e55; }
    .btn-remove {
      background: none; border: none; color: #ccc; font-size: 1.1rem;
      cursor: pointer; padding: 4px 8px; border-radius: 6px;
      transition: color 0.15s; flex-shrink: 0;
    }
    .btn-remove:hover { color: #e55; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px; padding: 10px 20px; border-radius: 8px; border: none;
      cursor: pointer; font-size: 0.9rem; font-weight: 600;
      transition: all 0.15s; letter-spacing: 0.02em;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--green); color: white; border: 1px solid var(--green); }
    .btn-primary:hover { background: #005228; border-color: #005228; }
    .btn-primary:disabled { background: #aaa; border-color: #aaa; cursor: not-allowed; }
    .btn-secondary { background: white; color: var(--green); border: 1.5px solid var(--green); }
    .btn-secondary:hover { background: var(--green-light); }
    .btn-ghost { background: white; color: var(--text-muted); border: 1.5px solid var(--border); }
    .btn-ghost:hover { border-color: var(--green); color: var(--green); }
    .btn-full { width: 100%; margin-top: 8px; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
    .share-box {
      background: linear-gradient(135deg, #f0fff7, #e8f5ee);
      border: 1.5px solid var(--green-mid); border-radius: 10px;
      padding: 16px; margin-top: 20px; display: none; animation: fadeUp 0.3s ease;
    }
    .share-label { font-size: 0.85rem; font-weight: 600; color: var(--green); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .share-url { display: flex; gap: 8px; }
    .share-url input { flex: 1; font-size: 0.82rem; background: white; color: #333; }
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a1a; color: white; padding: 12px 20px;
      border-radius: 10px; font-size: 0.9rem; font-weight: 500;
      z-index: 1000; transition: transform 0.3s ease;
      pointer-events: none; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    /* 入力列（テーブル右端） */
    th.input-col { background: #004d26; min-width: 100px; }
    th.input-col input[type="text"] {
      width: 100%; padding: 5px 8px; border-radius: 6px;
      border: none; font-size: 0.82rem; background: rgba(255,255,255,0.92);
      color: var(--text); outline: none;
    }
    td.input-col { background: #f5fdf8; border-left: 2px solid var(--green-mid); text-align: center; }
    .register-btn {
      width: 100%; padding: 8px 4px; background: var(--green); color: white;
      border: none; border-radius: 6px; font-size: 0.8rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s; white-space: nowrap;
    }
    .register-btn:hover { background: var(--green-dark); }
    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,105,52,0.4); }
      50% { box-shadow: 0 0 0 6px rgba(0,105,52,0); }
    }
    .btn-ready { animation: pulse-green 1.5s infinite; }
    .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; min-width: 300px; }
    thead tr { background: var(--green); }
    th { padding: 12px 10px; text-align: center; color: white; font-weight: 600; white-space: nowrap; font-size: 0.82rem; }
    th.date-col { text-align: left; min-width: 90px; }
    tbody tr { transition: background 0.1s; }
    tbody tr:hover { background: #f9fafb; }
    tbody tr:last-child td { border-bottom: none; }
    td { padding: 10px 10px; text-align: center; border-bottom: 1px solid #f0f0f0; }
    td.date-cell { text-align: left; font-weight: 600; color: var(--text); white-space: nowrap; font-size: 0.85rem; }
    td.date-cell.is-best { color: var(--green); background: var(--green-light); }
    td.date-cell.is-best::before { content: '★ '; color: var(--gold); }
    .vote-btn {
      background: none; border: 2px solid transparent; border-radius: 6px;
      font-size: 1.1rem; cursor: pointer; padding: 3px 5px;
      opacity: 0.2; transition: all 0.15s;
    }
    .vote-btn:hover { opacity: 0.6; transform: scale(1.1); }
    .vote-btn.selected { border-color: currentColor; opacity: 1; transform: scale(1.05); }
    .vote-btn.circle { color: #007a3d; }
    .vote-btn.triangle { color: var(--gold); }
    .vote-btn.cross { color: #c0392b; }
    .point-cell { font-weight: 700; font-size: 0.95rem; min-width: 52px; }
    .point-cell.is-best { color: var(--green); background: var(--green-light); }
    /* 確定日の強調表示 */
    tr.confirmed-row td { background: #fff8e6 !important; }
    tr.confirmed-row td.date-cell { color: #b8860b; font-weight: 800; }
    tr.confirmed-row td.date-cell::before { content: '🎉 '; }
    tr.confirmed-row td.point-cell { color: #b8860b; background: #fff0c0 !important; }
    .confirm-btn {
      font-size: 0.68rem; background: none;
      border: 1px solid rgba(255,255,255,0.4); color: rgba(255,255,255,0.85);
      border-radius: 4px; cursor: pointer; padding: 2px 6px; margin-left: 4px;
      transition: all 0.15s; white-space: nowrap;
    }
    .confirm-btn:hover { background: rgba(255,255,255,0.15); }
    .confirm-btn.confirmed { background: #c8a84b; border-color: #c8a84b; color: white; }
    /* 並び替えボタン */
    .reorder-btn {
      font-size: 0.65rem; background: none;
      border: 1px solid rgba(255,255,255,0.3); color: rgba(255,255,255,0.7);
      border-radius: 3px; cursor: pointer; padding: 1px 4px; margin: 1px;
      transition: all 0.15s;
    }
    .reorder-btn:hover { background: rgba(255,255,255,0.15); color: white; }
    .participant-th { min-width: 80px; font-size: 0.82rem; }
    .edit-btn {
      display: inline-block; margin-top: 5px; font-size: 0.68rem;
      background: none; border: 1px solid rgba(255,255,255,0.5);
      color: rgba(255,255,255,0.9); border-radius: 4px; cursor: pointer;
      padding: 2px 7px; font-weight: normal; transition: all 0.15s;
    }
    .edit-btn:hover { background: rgba(255,255,255,0.2); }
    .edit-btn.editing { background: #c8a84b; border-color: #c8a84b; color: white; }
    .del-btn {
      display: none; margin-top: 4px; font-size: 0.68rem;
      background: none; border: 1px solid rgba(255,80,80,0.6);
      color: rgba(255,150,150,1); border-radius: 4px; cursor: pointer;
      padding: 2px 7px; font-weight: normal; transition: all 0.15s;
    }
    .del-btn.visible { display: inline-block; }
    .del-btn:hover { background: rgba(255,80,80,0.2); }
    /* ロック中の投票ボタン */
    td.locked .vote-btn { pointer-events: none; }
    td.locked .note-input { pointer-events: none; color: #aaa; border-color: transparent; }
    .note-row td { background: #fafafa; padding: 8px 10px; }
    .note-label { font-size: 0.78rem; color: var(--text-muted); font-weight: 600; }
    .note-input {
      font-size: 0.8rem; color: #555; border: none;
      border-bottom: 1.5px dashed var(--green-mid); outline: none;
      background: transparent; width: 100%; padding: 2px 0; transition: border-color 0.2s;
    }
    .note-input:focus { border-color: var(--green); }
    .legend {
      display: flex; gap: 16px; flex-wrap: wrap;
      margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);
    }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.78rem; color: var(--text-muted); }
    .pin-hint { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; }
    .empty-msg, .loading { text-align: center; color: #bbb; padding: 40px; font-size: 0.9rem; }
    .loading::before { content: '⏳ '; }
    #viewCard { display: none; }
  </style>
</head>
<body>

<div class="header-top">
  <div class="header-top-inner"></div>
</div>
<div class="header">
  <div class="header-inner">
    <div class="header-logo">調整くん</div>
    <div class="header-titles"><span class="subtitle">Scheduling Tool</span></div>
  </div>
</div>

<div class="page">

<!-- イベント作成カード -->
<div class="card" id="setupCard">
  <div class="card-title"><div class="icon">✏️</div>イベントを作成</div>

  <div class="field">
    <label>イベント名</label>
    <input type="text" id="eventName" placeholder="例：6月の飲み会">
  </div>

  <div class="field">
    <label>開始日</label>
    <input type="date" id="startDate">
  </div>

  <div class="field">
    <label>期間</label>
    <div class="radio-group">
      <div class="radio-chip"><input type="radio" name="weeks" id="w1" value="1"><label for="w1">1週間</label></div>
      <div class="radio-chip"><input type="radio" name="weeks" id="w2" value="2"><label for="w2">2週間</label></div>
      <div class="radio-chip"><input type="radio" name="weeks" id="w3" value="3"><label for="w3">3週間</label></div>
      <div class="radio-chip"><input type="radio" name="weeks" id="w4" value="4"><label for="w4">1ヶ月</label></div>
      <div class="radio-chip"><input type="radio" name="weeks" id="w8" value="8"><label for="w8">2ヶ月</label></div>
      <div class="radio-chip"><input type="radio" name="weeks" id="w13" value="13"><label for="w13">3ヶ月</label></div>
      <div class="radio-chip"><input type="radio" name="weeks" id="w26" value="26"><label for="w26">6ヶ月</label></div>
    </div>
  </div>

  <div class="field">
    <label>曜日</label>
    <div class="radio-group">
      <div class="radio-chip"><input type="radio" name="daytype" id="dt1" value="weekday"><label for="dt1">平日のみ（祝日除く）</label></div>
      <div class="radio-chip"><input type="radio" name="daytype" id="dt2" value="all"><label for="dt2">土日祝を含む</label></div>
      <div class="radio-chip"><input type="radio" name="daytype" id="dt3" value="friday"><label for="dt3">金曜のみ（祝日除く）</label></div>
      <div class="radio-chip"><input type="radio" name="daytype" id="dt4" value="weekend"><label for="dt4">土日祝のみ</label></div>
    </div>
  </div>

  <div class="field">
    <label>候補日</label>
    <div style="margin-bottom:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <input type="checkbox" id="useTime" style="width:16px;height:16px;accent-color:var(--green);cursor:pointer;">
      <label for="useTime" style="font-size:0.88rem;color:var(--text-muted);cursor:pointer;text-transform:none;letter-spacing:0;margin:0;">日付に時刻を追加する</label>
      <input type="time" id="defaultTime" style="display:none;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:0.9rem;outline:none;background:#fafafa;accent-color:var(--green);">
      <span id="defaultTimeHint" style="display:none;font-size:0.78rem;color:var(--text-muted);">← 全候補日に一括適用（個別変更も可）</span>
    </div>
    <div id="dateList"></div>
    <div class="btn-row" style="margin-top:8px">
      <button class="btn" id="autoFillBtn" disabled style="background:#f0f0f0;color:#aaa;border:1.5px solid #ddd;cursor:not-allowed;">⚡ 自動入力</button>
      <span id="autoFillHint" style="display:none;font-size:0.82rem;color:var(--green);font-weight:600;">👆 押して候補日を入力してください</span>
      <button class="btn btn-ghost" id="addDateBtn">＋ 手動で追加</button>
    </div>
  </div>

  <div class="field">
    <label>メモ（出欠締め切り・場所・その他連絡事項など）</label>
    <textarea id="eventMemo" placeholder="例：出欠締め切り6月15日、場所は新橋駅周辺を予定" rows="3" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:0.95rem;outline:none;color:var(--text);resize:vertical;background:#fafafa;font-family:inherit;"></textarea>
  </div>

  <button class="btn btn-primary btn-full" id="createBtn" style="padding:14px;">
    🔗 イベントを作成してリンクを発行
  </button>

  <div class="share-box" id="shareBox">
    <div class="share-label">✅ 作成完了！それぞれのリンクを共有してください</div>
    <div style="margin-bottom:10px;">
      <div style="font-size:0.8rem;font-weight:600;color:var(--green);margin-bottom:4px;">👥 参加者用URL</div>
      <div class="share-url">
        <input type="text" id="shareUrl" readonly>
        <button class="btn btn-primary" id="copyBtn">コピー</button>
      </div>
    </div>
    <div>
      <div style="font-size:0.8rem;font-weight:600;color:#c0392b;margin-bottom:4px;">🔑 ホスト用URL（幹事専用・他人に見せないでください）</div>
      <div class="share-url">
        <input type="text" id="hostUrl" readonly>
        <button class="btn btn-primary" id="copyHostBtn">コピー</button>
      </div>
    </div>
  </div>
</div>

<!-- 回答カード -->
<div class="card" id="viewCard">
  <div class="card-title" style="justify-content:space-between;">
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="icon">🗓️</div>
      <span id="viewTitle">出欠を回答する</span>
      <button id="editTitleBtn" class="host-only" style="display:none;background:none;border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:0.75rem;color:var(--text-muted);cursor:pointer;">✏️ 編集</button>
    </div>
    <div id="hostBadge" style="display:none;background:#c0392b;color:white;font-size:0.72rem;font-weight:700;padding:3px 10px;border-radius:4px;letter-spacing:0.04em;">HOST</div>
  </div>

  <div id="memoWrap" style="display:none;background:var(--green-light);border:1px solid var(--green-mid);border-radius:6px;padding:12px 16px;margin-bottom:16px;font-size:0.88rem;color:var(--text);line-height:1.6;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
      <div><span style="font-weight:600;color:var(--green);margin-right:8px;">📋 メモ</span><span id="eventMemoView"></span></div>
      <button id="editMemoBtn" class="host-only" style="display:none;background:none;border:1px solid var(--green-mid);border-radius:4px;padding:2px 8px;font-size:0.75rem;color:var(--green);cursor:pointer;white-space:nowrap;">✏️ 編集</button>
    </div>
  </div>
  <!-- メモがない場合のホスト用追加ボタン -->
  <div id="addMemoWrap" class="host-only" style="display:none;margin-bottom:12px;">
    <button id="addMemoBtn" style="background:none;border:1px dashed var(--green-mid);border-radius:6px;padding:8px 16px;font-size:0.82rem;color:var(--text-muted);cursor:pointer;width:100%;">＋ メモを追加</button>
  </div>

  <!-- ホスト専用：参加者用URL表示 -->
  <div id="participantUrlWrap" class="host-only" style="display:none;background:#f5f5f5;border:1px solid var(--border);border-radius:6px;padding:12px 16px;margin-bottom:16px;">
    <div style="font-size:0.8rem;font-weight:600;color:var(--text-muted);margin-bottom:6px;">👥 参加者用URL（共有用）</div>
    <div style="display:flex;gap:8px;">
      <input type="text" id="participantUrlView" readonly style="flex:1;font-size:0.82rem;background:white;color:#333;margin-bottom:0;">
      <button class="btn btn-secondary" id="copyParticipantUrlBtn" style="white-space:nowrap;">コピー</button>
    </div>
  </div>
  <div id="tableWrap"><p class="loading">読み込み中</p></div>

  <div class="legend">
    <div class="legend-item"><span style="color:#007a3d;font-size:1rem;">◯</span> 参加できる（1pt）</div>
    <div class="legend-item"><span style="color:var(--gold);font-size:1rem;">△</span> おそらく参加可能（0.5pt）</div>
    <div class="legend-item"><span style="color:#c0392b;font-size:1rem;">✕</span> 参加できない（0pt）</div>
    <div class="legend-item"><span style="color:var(--gold);">★</span> 最高得点日</div>
  </div>
</div>

</div>
<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDkczQ9y3u3XaPgWtwBkXm0wwt3bsOGsZ4",
    authDomain: "nomikai-42968.firebaseapp.com",
    projectId: "nomikai-42968",
    storageBucket: "nomikai-42968.firebasestorage.app",
    messagingSenderId: "372499119823",
    appId: "1:372499119823:web:bcf75f587b6ef9ef8cc1ba"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ── ユーティリティ ──────────────────────────

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function debounce(fn, ms) {
    let timer;
    return (...args) => {
      clearTimeout(timer);
      timer = setTimeout(() => fn(...args), ms);
    };
  }

  // 名前を正規化（全角→半角、大文字→小文字、前後空白除去）して比較用キーを返す
  function normalizeName(name) {
    return name.trim().normalize('NFKC').toLowerCase();
  }

  // ── 祝日データ（2026〜2030年）──────────────

  const HOLIDAYS = {
    // 2026
    '2026-01-01':1,'2026-01-12':1,'2026-02-11':1,'2026-02-23':1,
    '2026-03-20':1,'2026-04-29':1,'2026-05-03':1,'2026-05-04':1,
    '2026-05-05':1,'2026-05-06':1,'2026-07-20':1,'2026-08-11':1,
    '2026-09-21':1,'2026-09-22':1,'2026-09-23':1,'2026-10-12':1,
    '2026-11-03':1,'2026-11-23':1,'2026-12-23':1,
    // 2027
    '2027-01-01':1,'2027-01-11':1,'2027-02-11':1,'2027-02-23':1,
    '2027-03-22':1,'2027-04-29':1,'2027-05-03':1,'2027-05-04':1,
    '2027-05-05':1,'2027-07-19':1,'2027-08-11':1,'2027-09-20':1,
    '2027-09-23':1,'2027-10-11':1,'2027-11-03':1,'2027-11-23':1,
    // 2028
    '2028-01-01':1,'2028-01-10':1,'2028-02-11':1,'2028-02-23':1,
    '2028-03-20':1,'2028-04-29':1,'2028-05-03':1,'2028-05-04':1,
    '2028-05-05':1,'2028-07-17':1,'2028-08-11':1,'2028-09-18':1,
    '2028-09-22':1,'2028-10-09':1,'2028-11-03':1,'2028-11-23':1,
    // 2029
    '2029-01-01':1,'2029-01-08':1,'2029-02-11':1,'2029-02-12':1,
    '2029-02-23':1,'2029-03-20':1,'2029-04-29':1,'2029-05-03':1,
    '2029-05-04':1,'2029-05-05':1,'2029-07-16':1,'2029-08-11':1,
    '2029-09-17':1,'2029-09-23':1,'2029-10-08':1,'2029-11-03':1,
    '2029-11-23':1,
    // 2030
    '2030-01-01':1,'2030-01-14':1,'2030-02-11':1,'2030-02-23':1,
    '2030-03-20':1,'2030-04-29':1,'2030-05-03':1,'2030-05-04':1,

    '2030-08-12':1,'2030-09-16':1,'2030-09-23':1,'2030-10-14':1,
    '2030-11-03':1,'2030-11-04':1,'2030-11-23':1,
  };

  const WEEKS = ['日','月','火','水','木','金','土'];

  function toDateStr(d) {
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    return `${yyyy}-${mm}-${dd}`;
  }

  // ── 候補日UI ────────────────────────────────

  function addDateRow(value, time) {
    const row = document.createElement('div');
    row.className = 'date-row';

    const input = document.createElement('input');
    input.type = 'date';
    if (value) input.value = value;

    const badge = document.createElement('span');
    badge.className = 'day-badge';
    const updateBadge = () => {
      if (input.value) {
        const dt = new Date(input.value + 'T00:00:00');
        const day = dt.getDay();
        badge.textContent = WEEKS[day];
        badge.className = 'day-badge' + (day === 0 || day === 6 ? ' weekend' : '');
      } else { badge.textContent = ''; }
    };
    input.addEventListener('change', updateBadge);
    input.addEventListener('input', updateBadge);
    updateBadge();

    // 時刻入力欄
    const timeInput = document.createElement('input');
    timeInput.type = 'time';
    timeInput.className = 'time-input';
    timeInput.style.cssText = 'width:110px;padding:10px 8px;border:1.5px solid var(--border);border-radius:8px;font-size:0.9rem;outline:none;background:#fafafa;';
    const defaultTimeVal = document.getElementById('defaultTime').value;
    timeInput.value = time || defaultTimeVal || '';
    timeInput.style.display = document.getElementById('useTime').checked ? 'inline-block' : 'none';

    const btn = document.createElement('button');
    btn.className = 'btn-remove';
    btn.textContent = '✕';
    btn.addEventListener('click', () => row.remove());

    row.appendChild(input);
    row.appendChild(badge);
    row.appendChild(timeInput);
    row.appendChild(btn);
    document.getElementById('dateList').appendChild(row);
  }

  // チェックボックスの変更で時刻欄を表示/非表示
  document.getElementById('useTime').addEventListener('change', (e) => {
    const checked = e.target.checked;
    const defaultTimeEl = document.getElementById('defaultTime');
    const hintEl = document.getElementById('defaultTimeHint');
    defaultTimeEl.style.display = checked ? 'inline-block' : 'none';
    hintEl.style.display = checked ? 'inline' : 'none';
    document.querySelectorAll('.time-input').forEach(el => {
      el.style.display = checked ? 'inline-block' : 'none';
      if (!checked) el.value = '';
    });
  });

  // 一括時刻を全候補日に適用
  document.getElementById('defaultTime').addEventListener('change', (e) => {
    document.querySelectorAll('.time-input').forEach(el => {
      el.value = e.target.value;
    });
  });

  function getDates() {
    const useTime = document.getElementById('useTime').checked;
    return Array.from(document.querySelectorAll('#dateList .date-row')).map(row => {
      const dateVal = row.querySelector('input[type=date]').value;
      if (!dateVal) return null;
      const timeVal = useTime ? (row.querySelector('input[type=time]').value || '') : '';
      return timeVal ? `${dateVal} ${timeVal}` : dateVal;
    }).filter(d => d !== null);
  }

  // 自動入力ボタンの有効化チェック
  function checkAutoFillReady() {
    const startVal = document.getElementById('startDate').value;
    const weeksEl = document.querySelector('input[name="weeks"]:checked');
    const daytypeEl = document.querySelector('input[name="daytype"]:checked');
    const btn = document.getElementById('autoFillBtn');
    const ready = startVal && weeksEl && daytypeEl;
    btn.disabled = !ready;
    const hint = document.getElementById('autoFillHint');
    if (ready) {
      btn.style.cssText = 'background:var(--green);color:white;border:1.5px solid var(--green);cursor:pointer;font-weight:700;';
      btn.classList.add('btn-ready');
      btn.textContent = '⚡ 候補日を自動入力する';
      if (hint) hint.style.display = 'inline';
    } else {
      btn.style.cssText = 'background:#f0f0f0;color:#aaa;border:1.5px solid #ddd;cursor:not-allowed;';
      btn.classList.remove('btn-ready');
      btn.textContent = '⚡ 自動入力';
      if (hint) hint.style.display = 'none';
    }
  }
  document.getElementById('startDate').addEventListener('change', checkAutoFillReady);
  document.querySelectorAll('input[name="weeks"], input[name="daytype"]').forEach(el => {
    el.addEventListener('change', checkAutoFillReady);
  });

  document.getElementById('autoFillBtn').addEventListener('click', () => {
    const startVal = document.getElementById('startDate').value;
    const weeksEl = document.querySelector('input[name="weeks"]:checked');
    const daytypeEl = document.querySelector('input[name="daytype"]:checked');
    const weeks = parseInt(weeksEl.value);
    const daytype = daytypeEl.value;
    document.getElementById('dateList').innerHTML = '';
    const current = new Date(startVal + 'T00:00:00');
    const end = new Date(startVal + 'T00:00:00');
    end.setDate(end.getDate() + weeks * 7);
    while (current < end) {
      const dateStr = toDateStr(current);
      const day = current.getDay();
      const isHoliday = !!HOLIDAYS[dateStr];
      let skip = false;
      if (daytype === 'weekday') skip = day === 0 || day === 6 || isHoliday;
      else if (daytype === 'friday') skip = day !== 5 || isHoliday;
      else if (daytype === 'weekend') skip = !(day === 0 || day === 6 || isHoliday);
      // 'all' はスキップなし
      if (!skip) addDateRow(dateStr);
      current.setDate(current.getDate() + 1);
    }
    document.getElementById('autoFillBtn').classList.remove('btn-ready');
    const hint = document.getElementById('autoFillHint');
    if (hint) hint.style.display = 'none';
    showToast('✅ 候補日を自動入力しました');
  });

  document.getElementById('addDateBtn').addEventListener('click', () => addDateRow(''));

  // ── イベント作成 ──────────────────────────────

  document.getElementById('createBtn').addEventListener('click', async () => {
    const name = document.getElementById('eventName').value.trim();
    const dates = getDates();
    if (!name) { showToast('⚠️ イベント名を入力してください'); return; }
    if (dates.length === 0) { showToast('⚠️ 候補日を1つ以上選択してください'); return; }
    const btn = document.getElementById('createBtn');
    btn.textContent = '作成中...';
    btn.disabled = true;
    const memo = document.getElementById('eventMemo').value.trim();
    const eventId = Math.random().toString(36).slice(2, 10);
    const hostKey = Math.random().toString(36).slice(2, 14);
    await setDoc(doc(db, 'events', eventId), { name, dates, memo, participants: {}, hostKey, confirmedDate: null, participantOrder: [] });
    const base = `${location.origin}${location.pathname}`;
    const url = `${base}?event=${eventId}`;
    const hostUrl = `${base}?event=${eventId}&host=${hostKey}`;
    document.getElementById('shareUrl').value = url;
    document.getElementById('hostUrl').value = hostUrl;
    document.getElementById('shareBox').style.display = 'block';
    btn.textContent = '✅ 作成済み';
    showToast('🎉 イベントを作成しました！');
  });

  function copyText(text, btnEl, label) {
    navigator.clipboard.writeText(text).then(() => {
      btnEl.textContent = '✅ コピー済み';
      showToast(`📋 ${label}をコピーしました`);
      setTimeout(() => btnEl.textContent = 'コピー', 2000);
    });
  }
  document.getElementById('copyBtn').addEventListener('click', () => {
    copyText(document.getElementById('shareUrl').value, document.getElementById('copyBtn'), '参加者用URL');
  });
  document.getElementById('copyHostBtn').addEventListener('click', () => {
    copyText(document.getElementById('hostUrl').value, document.getElementById('copyHostBtn'), 'ホスト用URL');
  });

  // ── 回答画面 ──────────────────────────────────

  const params = new URLSearchParams(location.search);
  const eventId = params.get('event');
  const hostParam = params.get('host');
  let isHost = false;
  let currentDates = [];
  let currentParticipantOrder = [];

  if (eventId) {
    document.getElementById('setupCard').style.display = 'none';
    document.getElementById('viewCard').style.display = 'block';
    const eventRef = doc(db, 'events', eventId);

    onSnapshot(eventRef, (snap) => {
      if (!snap.exists()) {
        document.getElementById('tableWrap').innerHTML = '<p class="empty-msg">イベントが見つかりません</p>';
        return;
      }
      const data = snap.data();
      currentDates = data.dates;
      currentParticipantOrder = data.participantOrder || [];

      // ホスト判定
      if (hostParam && hostParam === data.hostKey) {
        isHost = true;
        document.getElementById('hostBadge').style.display = 'inline-block';
        document.querySelectorAll('.host-only').forEach(el => el.style.display = 'inline-block');
        // 参加者用URLをセット
        const participantUrl = `${location.origin}${location.pathname}?event=${eventId}`;
        document.getElementById('participantUrlView').value = participantUrl;
      }

      // タイトル表示
      document.getElementById('viewTitle').textContent = data.name;

      // メモ表示
      const memoEl = document.getElementById('eventMemoView');
      const memoWrap = document.getElementById('memoWrap');
      const addMemoWrap = document.getElementById('addMemoWrap');
      if (data.memo) {
        memoEl.textContent = data.memo;
        memoWrap.style.display = 'block';
        if (addMemoWrap) addMemoWrap.style.display = 'none';
      } else {
        memoWrap.style.display = 'none';
        if (isHost && addMemoWrap) addMemoWrap.style.display = 'block';
      }

      renderTable(data.dates, data.participants || {}, data.confirmedDate ?? null, data.participantOrder || []);
    });

    // ── ホスト専用：タイトル編集 ──
    document.getElementById('editTitleBtn').addEventListener('click', () => {
      const current = document.getElementById('viewTitle').textContent;
      const newTitle = prompt('イベント名を編集してください：', current);
      if (newTitle && newTitle.trim() && newTitle.trim() !== current) {
        updateDoc(eventRef, { name: newTitle.trim() });
        showToast('✅ タイトルを更新しました');
      }
    });

    // ── ホスト専用：メモ編集 ──
    document.getElementById('editMemoBtn').addEventListener('click', () => {
      const current = document.getElementById('eventMemoView').textContent;
      const newMemo = prompt('メモを編集してください：', current);
      if (newMemo !== null) {
        updateDoc(eventRef, { memo: newMemo.trim() });
        showToast('✅ メモを更新しました');
      }
    });

    document.getElementById('copyParticipantUrlBtn')?.addEventListener('click', () => {
      copyText(document.getElementById('participantUrlView').value, document.getElementById('copyParticipantUrlBtn'), '参加者用URL');
    });

    document.getElementById('addMemoBtn')?.addEventListener('click', () => {
      const newMemo = prompt('メモを入力してください：', '');
      if (newMemo && newMemo.trim()) {
        updateDoc(eventRef, { memo: newMemo.trim() });
        showToast('✅ メモを追加しました');
      }
    });
  }

  // ── テーブル描画（関数分割）─────────────────

  function calcCounts(dates, entries) {
    return dates.map((_, i) =>
      entries.reduce((sum, [, v]) => sum + (v[i]==='o' ? 1 : v[i]==='t' ? 0.5 : 0), 0)
    );
  }

  function buildNameHeaders(entries) {
    const existing = entries.map(([name], idx) => {
      const reorderBtns = isHost ? `
        <div style="margin-top:3px;">
          ${idx > 0 ? `<button class="reorder-btn" data-name="${name}" data-dir="left">◀</button>` : ''}
          ${idx < entries.length - 1 ? `<button class="reorder-btn" data-name="${name}" data-dir="right">▶</button>` : ''}
        </div>` : '';
      return `<th class="participant-th" data-col="${name}">
        ${name}<br>
        <button class="edit-btn" data-name="${name}">✏️ 変更・削除</button><br>
        <button class="del-btn" data-name="${name}">🗑 削除する</button>
        ${reorderBtns}
       </th>`;
    }).join('');
    const inputCol = `<th class="input-col">
      <input type="text" id="newName" placeholder="名前を入力">
    </th>`;
    return existing + inputCol;
  }

  function buildDateRows(dates, entries, counts, confirmedDate) {
    const maxCount = Math.max(...counts, 0);
    return dates.map((d, i) => {
      const [datePart, timePart] = d.split(' ');
      const dt = new Date(datePart + 'T00:00:00');
      const day = dt.getDay();
      const dateLabel = `${dt.getMonth()+1}/${dt.getDate()}(${WEEKS[day]})` + (timePart ? ` ${timePart}` : '');
      const isBest = counts[i] === maxCount && maxCount > 0;
      const isConfirmed = confirmedDate === i;
      const cells = entries.map(([name, votes]) => buildVoteCell(name, i, votes[i] || '')).join('');
      const countStr = Number.isInteger(counts[i]) ? counts[i] : counts[i].toFixed(1);
      const inputCell = `<td class="input-col">
        ${[['o','◯','circle'],['t','△','triangle'],['x','✕','cross']].map(([key,lbl,cls]) =>
          `<button class="vote-btn ${cls}" data-new-idx="${i}" data-key="${key}">${lbl}</button>`
        ).join('')}
      </td>`;
      const confirmBtn = isHost
        ? `<button class="confirm-btn ${isConfirmed?'confirmed':''}" data-date-idx="${i}">${isConfirmed?'✅ 確定中':'📌 確定'}</button>`
        : '';
      return `<tr class="${isConfirmed?'confirmed-row':''}">
        <td class="date-cell${isBest&&!isConfirmed?' is-best':''}">${dateLabel}${confirmBtn}</td>
        ${cells}
        ${inputCell}
        <td class="point-cell${isBest&&!isConfirmed?' is-best':''}">${countStr}</td>
      </tr>`;
    }).join('');
  }

  function buildVoteCell(name, idx, current) {
    const colorMap = { o: '#007a3d', t: '#c8a84b', x: '#c0392b' };
    const labelMap = { o: '◯', t: '△', x: '✕' };
    // ロック時：選択済みの記号だけ表示
    const display = current
      ? `<span class="vote-display" style="color:${colorMap[current]};font-size:1.2rem;font-weight:700;">${labelMap[current]}</span>`
      : `<span style="color:#ccc;font-size:0.8rem;">-</span>`;
    // 編集時用の全ボタン（初期非表示）
    const btns = [['o','◯','circle'],['t','△','triangle'],['x','✕','cross']].map(([key,label,cls]) =>
      `<button class="vote-btn ${cls} ${current===key?'selected':''}" data-name="${name}" data-idx="${idx}" data-key="${key}" style="display:none;">${label}</button>`
    ).join('');
    return `<td class="locked" data-col="${name}">${display}${btns}</td>`;
  }

  function buildNoteRow(entries) {
    const cells = entries.map(([name, votes]) => {
      const noteVal = (votes._note || '').replace(/"/g,'&quot;');
      return `<td class="locked" data-col="${name}"><input type="text" class="note-input" data-name="${name}" value="${noteVal}" placeholder="備考を追加..."></td>`;
    }).join('');
    const inputCell = `<td class="input-col">
      <input type="text" id="newNote" placeholder="備考（任意）" style="width:100%;padding:5px 8px;border:1.5px solid var(--green-mid);border-radius:6px;font-size:0.82rem;outline:none;">
    </td>`;
    return `<tr class="note-row"><td class="date-cell note-label">備考</td>${cells}${inputCell}<td></td></tr>`;
  }

  function attachVoteHandlers(wrap) {
    // 既存参加者：編集モード中のみUI上の選択状態を変更
    wrap.querySelectorAll('.vote-btn[data-name]').forEach(btn => {
      btn.addEventListener('click', () => {
        const name = btn.dataset.name;
        const idx = btn.dataset.idx;
        wrap.querySelectorAll(`.vote-btn[data-name="${name}"][data-idx="${idx}"]`)
          .forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      });
    });
    // 入力列：新規回答の選択
    wrap.querySelectorAll('.vote-btn[data-new-idx]').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = btn.dataset.newIdx;
        wrap.querySelectorAll(`.vote-btn[data-new-idx="${idx}"]`)
          .forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      });
    });
  }

  function attachNoteHandlers(wrap) {
    // 備考は編集モード中のみ入力可（ロック解除はattachDeleteHandlersで管理）
    // 保存は完了ボタン押下時にまとめて行う
  }

  function attachDeleteHandlers(wrap, dates) {
    // 変更・削除ボタン：編集モードのトグル
    wrap.querySelectorAll('.edit-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const name = btn.dataset.name;
        const isEditing = btn.classList.contains('editing');
        const cells = wrap.querySelectorAll(`td[data-col="${name}"]`);
        const delBtn = wrap.querySelector(`.del-btn[data-name="${name}"]`);

        if (isEditing) {
          // 完了：現在のUI状態をFirebaseに一括保存
          const updates = {};
          dates.forEach((_, i) => {
            const selected = wrap.querySelector(`.vote-btn[data-name="${name}"][data-idx="${i}"].selected`);
            if (selected) updates[`participants.${name}.${i}`] = selected.dataset.key;
          });
          const noteInput = wrap.querySelector(`.note-input[data-name="${name}"]`);
          if (noteInput) updates[`participants.${name}._note`] = noteInput.value.trim();
          if (Object.keys(updates).length > 0) {
            await updateDoc(doc(db, 'events', eventId), updates);
          }
          btn.classList.remove('editing');
          btn.textContent = '✏️ 変更・削除';
          cells.forEach(td => {
            td.classList.add('locked');
            // ボタンを隠して表示ラベルを出す
            td.querySelectorAll('.vote-btn').forEach(b => b.style.display = 'none');
            const colorMap = { o: '#007a3d', t: '#c8a84b', x: '#c0392b' };
            const labelMap = { o: '◯', t: '△', x: '✕' };
            const sel = td.querySelector('.vote-btn.selected');
            let disp = td.querySelector('.vote-display');
            if (!disp) { disp = document.createElement('span'); disp.className = 'vote-display'; td.insertBefore(disp, td.firstChild); }
            if (sel) { disp.style.cssText = `color:${colorMap[sel.dataset.key]};font-size:1.2rem;font-weight:700;`; disp.textContent = labelMap[sel.dataset.key]; }
            else { disp.style.cssText = 'color:#ccc;font-size:0.8rem;'; disp.textContent = '-'; }
          });
          delBtn.classList.remove('visible');
          showToast('💾 変更を保存しました');
        } else {
          // 編集モード開始：表示ラベルを隠してボタンを出す
          btn.classList.add('editing');
          btn.textContent = '✅ 完了';
          cells.forEach(td => {
            td.classList.remove('locked');
            td.querySelectorAll('.vote-display').forEach(el => el.style.display = 'none');
            td.querySelectorAll('.vote-btn').forEach(b => b.style.display = 'inline-block');
          });
          delBtn.classList.add('visible');
        }
      });
    });

    // 削除ボタン
    wrap.querySelectorAll('.del-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const name = btn.dataset.name;
        if (!confirm(`「${name}」の回答を削除しますか？`)) return;
        const snap = await getDoc(doc(db, 'events', eventId));
        const newP = { ...snap.data().participants };
        delete newP[name];
        await updateDoc(doc(db, 'events', eventId), { participants: newP });
        showToast(`🗑 ${name} さんの回答を削除しました`);
      });
    });
  }

  function renderTable(dates, participants, confirmedDate, participantOrder) {
    const wrap = document.getElementById('tableWrap');
    const allEntries = Object.entries(participants);

    // 並び順の適用
    allEntries.sort((a, b) => {
      const ai = participantOrder.indexOf(a[0]);
      const bi = participantOrder.indexOf(b[0]);
      if (ai === -1 && bi === -1) return (a[1]._joinedAt || 0) - (b[1]._joinedAt || 0);
      if (ai === -1) return 1;
      if (bi === -1) return -1;
      return ai - bi;
    });

    const counts = calcCounts(dates, allEntries);
    const colSpan = allEntries.length + 3;

    const registerRow = `<tr>
      <td colspan="${colSpan - 2}"></td>
      <td class="input-col">
        <button class="register-btn" id="registerBtn">登録する</button>
      </td>
      <td></td>
    </tr>`;

    wrap.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th class="date-col">日付</th>
            ${buildNameHeaders(allEntries)}
            <th style="min-width:52px">Pt</th>
          </tr></thead>
          <tbody>
            ${buildDateRows(dates, allEntries, counts, confirmedDate)}
            ${buildNoteRow(allEntries)}
            ${registerRow}
          </tbody>
        </table>
      </div>`;

    attachVoteHandlers(wrap);
    attachNoteHandlers(wrap);
    attachDeleteHandlers(wrap, dates);

    // ── ホスト専用：日程確定ボタン ──
    if (isHost) {
      wrap.querySelectorAll('.confirm-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const idx = parseInt(btn.dataset.dateIdx);
          const snap = await getDoc(doc(db, 'events', eventId));
          const current = snap.data().confirmedDate;
          // 既に確定中なら解除、そうでなければ確定
          await updateDoc(doc(db, 'events', eventId), { confirmedDate: current === idx ? null : idx });
          showToast(current === idx ? '📌 確定を解除しました' : '🎉 日程を確定しました');
        });
      });

      // ── ホスト専用：並び替えボタン ──
      wrap.querySelectorAll('.reorder-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const name = btn.dataset.name;
          const dir = btn.dataset.dir;
          const snap = await getDoc(doc(db, 'events', eventId));
          const data = snap.data();
          // 現在の順序を取得
          const order = data.participantOrder?.length
            ? [...data.participantOrder]
            : Object.entries(data.participants).sort((a,b) => (a[1]._joinedAt||0)-(b[1]._joinedAt||0)).map(([n])=>n);
          // 全参加者が含まれるよう補完
          Object.keys(data.participants).forEach(n => { if (!order.includes(n)) order.push(n); });
          const idx = order.indexOf(name);
          if (dir === 'left' && idx > 0) [order[idx-1], order[idx]] = [order[idx], order[idx-1]];
          if (dir === 'right' && idx < order.length-1) [order[idx], order[idx+1]] = [order[idx+1], order[idx]];
          await updateDoc(doc(db, 'events', eventId), { participantOrder: order });
        });
      });
    }

    // 登録ボタン
    const registerBtn = wrap.querySelector('#registerBtn');
    if (registerBtn) {
      registerBtn.addEventListener('click', async () => {
        const rawName = (wrap.querySelector('#newName')?.value || '').trim();
        if (!rawName) { showToast('⚠️ 名前を入力してください'); return; }
        const snap = await getDoc(doc(db, 'events', eventId));
        const data = snap.data();
        const existing = data.participants || {};
        if (Object.keys(existing).some(n => normalizeName(n) === normalizeName(rawName))) {
          showToast('⚠️ 同じ名前が既に登録されています'); return;
        }
        // 全候補日の選択チェック
        const unselected = dates.findIndex((_, i) =>
          !wrap.querySelector(`.vote-btn[data-new-idx="${i}"].selected`)
        );
        if (unselected !== -1) {
          const dt = new Date(dates[unselected] + 'T00:00:00');
          showToast(`⚠️ ${dt.getMonth()+1}/${dt.getDate()} の回答を選択してください`);
          return;
        }
        const note = (wrap.querySelector('#newNote')?.value || '').trim();
        const votes = { _note: note, _joinedAt: Date.now() };
        dates.forEach((_, i) => {
          const sel = wrap.querySelector(`.vote-btn[data-new-idx="${i}"].selected`);
          votes[i] = sel ? sel.dataset.key : '';
        });
        await updateDoc(doc(db, 'events', eventId), { [`participants.${rawName}`]: votes });
        showToast(`✅ ${rawName} さんの回答を登録しました`);
      });
    }
  }
</script>
</body>
</html>
